description: >-
  FinOps view of Alpaca spend. Alpaca's cost surface is unusual because trading
  is commission-free and paper trading is free, so the recurring, forecastable
  spend concentrates in market data. The dominant meter is the market-data
  subscription: $0 on the Basic plan or a flat $99/month for Algo Trader Plus
  per account. Options and crypto trading can add per-contract or spread-based
  transaction costs, and the Broker API adds negotiated per-partner platform
  fees for businesses. Because the pricing is mostly flat-subscription rather
  than per-call, the main FinOps lever is right-sizing the market-data tier to
  the feeds (IEX vs SIP, indicative vs OPRA) and symbol counts you actually
  need.
notes: >-
  Trading commissions are $0 for US stocks/ETFs, but regulatory and exchange
  pass-through fees and options/crypto transaction costs still apply; confirm
  current fee schedules. Broker API fees are set by contract and are not public.
