meters:
- name: market_data_subscription
  description: Flat monthly market-data plan fee ($0 Basic or $99 Algo Trader Plus) per account.
  unit: months
  aggregation: sum
  dimensions:
  - account
  - plan
- name: options_contracts
  description: Per-contract fees on options trades, where applicable.
  unit: contracts
  aggregation: sum
  dimensions:
  - account
  - symbol
- name: crypto_transaction_fees
  description: Spread or percentage-based fees on crypto trades.
  unit: usd
  aggregation: sum
  dimensions:
  - account
  - pair
- name: broker_platform_fees
  description: Negotiated per-partner Broker API platform / per-account fees.
  unit: usd
  aggregation: sum
  dimensions:
  - partner
  - end_account
principles:
- name: Visibility
  description: Track the market-data plan per API key and the transaction fees on options and crypto; on Broker, attribute per-partner platform fees.
- name: Allocation
  description: Map each API key / account to a workload or strategy so the flat market-data subscription and any transaction fees land on the right cost center.
- name: Optimization
  description: Right-size the market-data tier - stay on free Basic (IEX, delayed SIP) unless you genuinely need real-time SIP or OPRA options, and consolidate symbol subscriptions to avoid needing the paid plan prematurely.
- name: Accountability
  description: Review monthly whether each Algo Trader Plus subscription is still justified by active real-time SIP/OPRA usage; downgrade idle accounts to Basic.
