  description: Commission-free trading of US stocks, ETFs, options, and crypto.
    Submit, replace, and cancel orders; read account balances, positions, portfolio
    history, and account activities; browse tradable assets; and manage watchlists,
    the market calendar, and clock. Runs identically against the free paper-trading
    sandbox at paper-api.alpaca.markets and a funded live account.
- aid: alpaca-markets:alpaca-markets-market-data-api
  name: Alpaca Market Data API
  tags:
  - Market Data
  - Financial Data
  - Stocks
  - Crypto
  - Options
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.alpaca.markets/reference/stockbars
  baseURL: https://data.alpaca.markets
  properties:
  - url: https://docs.alpaca.markets/docs/about-market-data-api
    type: Documentation
  - url: https://docs.alpaca.markets/reference/stockbars
    type: APIReference
  - url: openapi/alpaca-markets-openapi.yml
    type: OpenAPI
  - url: collections/alpaca-markets.postman_collection.json
    type: PostmanCollection
  - url: collections/alpaca-markets.opencollection.json
    type: OpenCollection
  description: Historical and real-time pricing data for US stocks (SIP and IEX
    feeds), crypto, and options - bars, trades, quotes, snapshots, auctions,
    orderbooks, latest values, plus a news feed, corporate actions, and a
    most-actives / movers screener. REST over data.alpaca.markets with v2 stocks,
    v1beta3 crypto, and v1beta1 options / news / screener namespaces.
- aid: alpaca-markets:alpaca-markets-streaming-api
  name: Alpaca Market Data Streaming API
  tags:
  - Streaming
  - WebSocket
  - Market Data
  - Real Time
  - Trading
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.alpaca.markets/docs/streaming-market-data
  baseURL: wss://stream.data.alpaca.markets
  properties:
  - url: https://docs.alpaca.markets/docs/streaming-market-data
    type: Documentation
  - url: https://docs.alpaca.markets/docs/real-time-crypto-pricing-data
    type: APIReference
  - url: asyncapi/alpaca-markets-asyncapi.yml
    type: AsyncAPI
  description: Real-time market data over WebSocket. Stocks stream at
    wss://stream.data.alpaca.markets/v2/{feed} (iex, sip, delayed_sip, test) and
    crypto at wss://stream.data.alpaca.markets/v1beta3/crypto/us. Authenticate with
    an auth message, then subscribe to trades, quotes, bars, dailyBars,
    updatedBars, statuses, lulds, and (crypto) orderbooks per symbol or with a
    wildcard. This is a documented public wss:// API.
