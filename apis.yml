    customer brokerage accounts (KYC/onboarding), move money via ACH and wire
    transfers, journal cash and securities between accounts, place trades on behalf
    of customers, and access documents and events. Sandbox at
    broker-api.sandbox.alpaca.markets uses HTTP Basic auth.
