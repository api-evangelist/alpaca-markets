aid: alpaca-markets
url: https://raw.githubusercontent.com/api-evangelist/alpaca-markets/refs/heads/main/apis.yml
name: Alpaca
kind: company
description: Alpaca is a developer-first, commission-free brokerage that exposes
  stock, ETF, options, and crypto trading and market data entirely through APIs.
  The Trading API places and manages orders against a free paper-trading sandbox
  (paper-api.alpaca.markets) or a live account (api.alpaca.markets/v2); the Market
  Data API serves historical and real-time stocks, crypto, options, news, and
  corporate actions over REST plus WebSocket streams (data.alpaca.markets and
  stream.data.alpaca.markets); and the Broker API lets businesses open and fund
  end-user brokerage accounts. Authentication uses APCA-API-KEY-ID and
  APCA-API-SECRET-KEY headers, with OAuth2 available for third-party apps.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
