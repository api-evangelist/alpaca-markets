sources:
  - url: https://docs.alpaca.markets/docs/getting-started
    type: Documentation
    note: Lists Trading, Market Data, Broker, Connect, and FIX products; base domains and APCA-API-KEY-ID / APCA-API-SECRET-KEY auth.
  - url: https://docs.alpaca.markets/docs/streaming-market-data
    type: Documentation
    note: WebSocket stream schema wss://stream.data.alpaca.markets/{version}/{feed}; auth + subscribe message formats; channels trades/quotes/bars/dailyBars/updatedBars/statuses/lulds/corrections/cancelErrors.
  - url: https://docs.alpaca.markets/docs/real-time-crypto-pricing-data
    type: Documentation
    note: Crypto WebSocket wss://stream.data.alpaca.markets/v1beta3/crypto/us with orderbooks channel; v1beta3 distributes Alpaca + Kraken data.
  - url: https://docs.alpaca.markets/reference/stockbars
    type: APIReference
    note: Market Data REST base data.alpaca.markets; stocks bars/trades/quotes/snapshots endpoints.
  - url: https://docs.alpaca.markets/reference/getaccount-1
    type: APIReference
    note: Trading API base https://api.alpaca.markets/v2, paper https://paper-api.alpaca.markets/v2; GET /v2/account.
  - url: https://alpaca.markets/data
    type: Pricing
    note: Free plan (IEX real-time WS, 200 rpm, 15-min delayed REST) vs Algo Trader Plus $99/mo (full SIP, OPRA options, up to 10000 rpm).
actions:
  asyncapiPath: asyncapi/alpaca-markets-asyncapi.yml
  apisYmlUpdated: true
  reason: |
    Alpaca publishes a real, documented public WebSocket API for real-time
    market data (stocks, crypto, and options streams under
    wss://stream.data.alpaca.markets), plus a Trading API account/order
    WebSocket. An AsyncAPI 2.6 document was authored for the market-data
    stream, and a dedicated Streaming API entry was added to apis.yml alongside
    the Trading, Market Data, and Broker REST APIs.
