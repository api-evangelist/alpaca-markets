aid: alpaca-markets
name: Alpaca
review:
  question: Does Alpaca expose a documented public WebSocket API?
  answer: true
  date: '2026-07-11'
  reviewer: API Evangelist
  asyncapiSpecCreated: true
  asyncapiScopeNote: |
    Alpaca publishes a genuine public WebSocket (wss://) API for real-time
    market data, so an AsyncAPI 2.6 document was authored at
    asyncapi/alpaca-markets-asyncapi.yml modeling the stocks stream
    (wss://stream.data.alpaca.markets/v2/{feed}) and the crypto stream
    (wss://stream.data.alpaca.markets/v1beta3/crypto/us). The document covers
    the client-sent control messages (auth, subscribe, unsubscribe) and the
    server-sent data messages (success/error/subscription control frames plus
    trades, quotes, bars, dailyBars, updatedBars, statuses, lulds, corrections,
    cancelErrors, and crypto orderbooks). Streaming account/order updates
    (Trading API trade_updates over wss://.../stream and the Broker API SSE
    events feed) are additional server-push surfaces noted but not fully
    modeled here.
findings:
  summary: |
    Alpaca DOES publish a documented public WebSocket API. The Market Data API
    exposes real-time streaming over WebSocket at
    wss://stream.data.alpaca.markets. US equities stream from
    wss://stream.data.alpaca.markets/v2/{feed}, where {feed} is one of iex,
    sip, delayed_sip, or test (a 24/7 fake-symbol feed for development).
    Crypto streams from wss://stream.data.alpaca.markets/v1beta3/crypto/us, and
    options from wss://stream.data.alpaca.markets/v1beta1/{feed}. A sandbox
    mirror is available at wss://stream.data.sandbox.alpaca.markets. Clients
    connect, send an auth control message
    ({"action":"auth","key":"...","secret":"..."}), then a subscribe message
    selecting channels (trades, quotes, bars, dailyBars, updatedBars, statuses,
    lulds, and crypto orderbooks) per symbol or with a "*" wildcard. Messages
    are exchanged as JSON (msgpack also supported). Separately, the Trading API
    exposes a real-time account/order WebSocket
    (wss://{paper-}api.alpaca.markets/stream, listen -> trade_updates), and the
    Broker API exposes server-push events via SSE. This entry therefore answers
    TRUE and ships an AsyncAPI 2.6 document for the market-data stream.
  transports:
    - protocol: REST
      scheme: https
      baseURL: https://api.alpaca.markets/v2
      documented: true
      note: Trading API. Paper sandbox at https://paper-api.alpaca.markets/v2.
    - protocol: REST
      scheme: https
      baseURL: https://data.alpaca.markets
      documented: true
      note: Market Data API - v2 stocks, v1beta3 crypto, v1beta1 options/news/screener.
    - protocol: REST
      scheme: https
      baseURL: https://broker-api.alpaca.markets/v1
      documented: true
      note: Broker API. Sandbox at https://broker-api.sandbox.alpaca.markets/v1 (HTTP Basic auth).
    - protocol: WebSocket
      scheme: wss
      baseURL: wss://stream.data.alpaca.markets
      documented: true
      note: >-
        Real-time market data. Stocks wss://stream.data.alpaca.markets/v2/{feed}
        (iex, sip, delayed_sip, test); crypto
        wss://stream.data.alpaca.markets/v1beta3/crypto/us; options
        wss://stream.data.alpaca.markets/v1beta1/{feed}. Sandbox mirror at
        wss://stream.data.sandbox.alpaca.markets.
    - protocol: WebSocket
      scheme: wss
      baseURL: wss://api.alpaca.markets/stream
      documented: true
      note: >-
        Trading API real-time account/order updates. Authenticate, then listen
        to trade_updates. Paper at wss://paper-api.alpaca.markets/stream.
    - protocol: SSE
      scheme: https
      documented: true
      note: Broker API events (accounts, trades, transfers, journals, nta) delivered as Server-Sent Events.
